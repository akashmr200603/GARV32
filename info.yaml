---
# Tiny Tapeout project information
yaml_version: 6

project:
  title:        "GARV32"      # Project title
  author:       "Director, CSIR - CEERI (Dr. Gaurav Purohit)"              # Your name
  description:  "A 32-bit RISC-V SoC with QSPI XIP, 64B SRAM, 16B I-Cache, and interfaces"
  language:     "Verilog"                         # e.g., Verilog, SystemVerilog, VHDL, etc.
  clock_hz:     50000000                          # Clock frequency in Hz (if required)

  # Since our design has ~25000 cells, we require an 8x2 layout (16 tiles).
  tiles: "4x2" 

  # Top level module name
  top_module:   "tt_um_rv32i"

  # Path to the source files
  source_files:
    - "tt_um_rv32i.v"
    - "rv5.v"
    - "rv5_bus.v"
    - "rv5_core.v"
    - "rv5_gpio.v"
    - "rv5_housekeeping.v"
    - "rv5_i2c.v"
    - "rv5_icache.v"
    - "rv5_mtimer.v"
    - "rv5_por.v"
    - "rv5_pwm.v"
    - "rv5_qspi.v"
    - "rv5_ram.v"
    - "rv5_spi.v"
    - "rv5_uart.v"

# Pinout mapping
pinout:
  # Inputs (Dedicated)
  ui[0]: "UART0 RX"
  ui[1]: "UART1 RX"
  ui[2]: "SPI0 MISO"
  ui[3]: "GPIO IN 0"
  ui[4]: "GPIO IN 1"
  ui[5]: "GPIO IN 2"
  ui[6]: "Unused"
  ui[7]: "Unused"

  # Outputs (Dedicated)
  uo[0]: "UART0 TX"
  uo[1]: "QSPI Serial Clock (Hardwired)"
  uo[2]: "QSPI Flash CS (Hardwired)"
  uo[3]: "QSPI PSRAM CS (Hardwired)"
  uo[4]: "UART1 TX"
  uo[5]: "SPI0 SCK"
  uo[6]: "SPI0 MOSI"
  uo[7]: "SPI0 CS"

  # Bidirectional (IOs)
  uio[0]: "QSPI Data IO 0 (Hardwired)"
  uio[1]: "QSPI Data IO 1 (Hardwired)"
  uio[2]: "QSPI Data IO 2 (Hardwired)"
  uio[3]: "QSPI Data IO 3 (Hardwired)"
  uio[4]: "I2C0 SDA"
  uio[5]: "I2C0 SCL"
  uio[6]: "PWM OUT"
  uio[7]: "GPIO Bidir 3"
